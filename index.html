<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>デモ機管理カレンダー</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Firebase compat版（より安定） -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --primary: #1a56db;
      --primary-light: #e8f0fe;
      --danger: #e02424;
      --bg: #f4f6fb;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-muted: #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header {
      background: var(--primary); color: white;
      padding: 12px 16px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    header h1 { font-size: 16px; font-weight: 700; }
    #userInfo { font-size: 12px; display: flex; align-items: center; gap: 8px; }
    #logoutBtn {
      background: rgba(255,255,255,0.2); border: none; color: white;
      padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; font-family: inherit;
    }

    #loginScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .login-card {
      background: white; border-radius: 16px; padding: 40px 32px;
      width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
    .login-card h2 { font-size: 22px; margin-bottom: 8px; color: var(--primary); }
    .login-card p { color: var(--text-muted); font-size: 13px; margin-bottom: 28px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
    .form-group input {
      width: 100%; padding: 10px 14px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 14px; font-family: inherit; outline: none;
    }
    .form-group input:focus { border-color: var(--primary); }
    .btn-primary {
      width: 100%; background: var(--primary); color: white; border: none;
      padding: 12px; border-radius: 8px; font-size: 15px; font-weight: 700;
      font-family: inherit; cursor: pointer; margin-top: 8px;
    }
    .error-msg { color: var(--danger); font-size: 13px; margin-top: 10px; text-align: center; min-height: 20px; }
    .login-toggle { text-align: center; margin-top: 16px; font-size: 13px; color: var(--text-muted); }
    .login-toggle a { color: var(--primary); cursor: pointer; text-decoration: underline; }

    #appScreen { display: none; }

    .week-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; background: white; border-bottom: 1px solid var(--border);
      position: sticky; top: 48px; z-index: 90;
    }
    .nav-arrow {
      background: var(--primary-light); color: var(--primary); border: none;
      width: 36px; height: 36px; border-radius: 8px; font-size: 18px; cursor: pointer;
    }
    #weekLabel { font-size: 14px; font-weight: 700; }
    #todayBtn {
      background: var(--primary); color: white; border: none;
      padding: 6px 14px; border-radius: 8px; font-size: 13px;
      font-weight: 700; font-family: inherit; cursor: pointer;
    }

    .calendar-wrap { overflow-x: auto; padding: 10px; }
    table { width: 100%; border-collapse: collapse; min-width: 560px; }
    thead th {
      background: var(--primary); color: white; padding: 7px 4px;
      font-size: 11px; font-weight: 700; text-align: center;
    }
    thead th.device-col { text-align: left; padding-left: 8px; min-width: 100px; background: #0f3a9e; }
    thead th.today-col { background: #1a3fa8; }
    tbody tr:nth-child(odd) { background: #fafbff; }
    tbody tr:nth-child(even) { background: white; }
    tbody tr:hover { background: var(--primary-light); }
    td { border: 1px solid var(--border); padding: 0; vertical-align: middle; }
    .device-name {
      padding: 6px 8px; font-size: 11px; font-weight: 700;
      white-space: nowrap; display: flex; align-items: center; gap: 4px;
    }
    .info-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 13px; padding: 1px; line-height: 1;
    }

    .slot {
      min-height: 40px; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      padding: 4px; transition: background 0.15s; position: relative;
    }
    .slot:hover { background: #d0e0fc; }
    .slot.booked { background: #fee2e2; }
    .slot.booked:hover { background: #fecaca; }
    .slot-label {
      position: absolute; top: 2px; left: 3px;
      font-size: 8px; color: var(--text-muted); font-weight: 700;
    }
    .slot-text { font-size: 11px; font-weight: 600; color: var(--danger); text-align: center; word-break: break-all; }
    .slot.empty .slot-text { color: #b0bec5; font-weight: 400; font-size: 14px; }

    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 200;
      align-items: flex-end; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: white; border-radius: 20px 20px 0 0;
      padding: 24px 20px 36px; width: 100%; max-width: 480px;
      animation: slideUp 0.22s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal h3 { font-size: 16px; margin-bottom: 4px; }
    .modal-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 18px; }
    .modal input[type=text] {
      width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 15px; font-family: inherit; outline: none; margin-bottom: 12px;
    }
    .modal input[type=text]:focus { border-color: var(--primary); }
    .quick-names { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .quick-btn {
      background: var(--primary-light); color: var(--primary); border: none;
      padding: 6px 14px; border-radius: 20px; font-size: 13px;
      font-family: inherit; cursor: pointer; font-weight: 500;
    }
    .modal-actions { display: flex; gap: 10px; }
    .btn-save {
      flex: 1; background: var(--primary); color: white; border: none;
      padding: 12px; border-radius: 8px; font-size: 15px;
      font-weight: 700; font-family: inherit; cursor: pointer;
    }
    .btn-delete {
      background: #fee2e2; color: var(--danger); border: none;
      padding: 12px 18px; border-radius: 8px; font-size: 14px;
      font-weight: 700; font-family: inherit; cursor: pointer;
    }
    .btn-cancel {
      background: var(--bg); color: var(--text-muted); border: none;
      padding: 12px 14px; border-radius: 8px; font-size: 14px;
      font-family: inherit; cursor: pointer;
    }

    .field { margin-bottom: 14px; }
    .field label { font-size: 12px; color: var(--text-muted); font-weight: 700; display: block; margin-bottom: 4px; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 14px; font-family: inherit; outline: none;
    }
    .field textarea { resize: vertical; min-height: 60px; }

    #loadingMsg { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }
  </style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <h2>📋 デモ機管理</h2>
    <p>ログインして予約を管理できます</p>
    <div id="loginForm">
      <div class="form-group">
        <label>メールアドレス</label>
        <input type="email" id="loginEmail" placeholder="example@company.com" />
      </div>
      <div class="form-group">
        <label>パスワード</label>
        <input type="password" id="loginPassword" placeholder="パスワード" />
      </div>
      <button class="btn-primary" onclick="doLogin()">ログイン</button>
      <div class="error-msg" id="loginErr"></div>
      <div class="login-toggle">アカウントがない場合は <a onclick="showReg()">新規登録</a></div>
    </div>
    <div id="regForm" style="display:none">
      <div class="form-group">
        <label>お名前（表示名）</label>
        <input type="text" id="regName" placeholder="山田 太郎" />
      </div>
      <div class="form-group">
        <label>メールアドレス</label>
        <input type="email" id="regEmail" placeholder="example@company.com" />
      </div>
      <div class="form-group">
        <label>パスワード</label>
        <input type="password" id="regPass" placeholder="6文字以上" />
      </div>
      <button class="btn-primary" onclick="doRegister()">登録してログイン</button>
      <div class="error-msg" id="regErr"></div>
      <div class="login-toggle"><a onclick="showLogin()">ログインに戻る</a></div>
    </div>
  </div>
</div>

<div id="appScreen">
  <header>
    <h1>📋 デモ機管理カレンダー</h1>
    <div id="userInfo">
      <span id="userName"></span>
      <button id="logoutBtn" onclick="doLogout()">ログアウト</button>
    </div>
  </header>
  <div class="week-nav">
    <button class="nav-arrow" onclick="changeWeek(-1)">‹</button>
    <div style="display:flex;align-items:center;gap:10px;">
      <span id="weekLabel"></span>
      <button id="todayBtn" onclick="goToday()">今週</button>
    </div>
    <button class="nav-arrow" onclick="changeWeek(1)">›</button>
  </div>
  <div class="calendar-wrap">
    <div id="loadingMsg">読み込み中...</div>
    <table id="calTable" style="display:none">
      <thead id="calHead"></thead>
      <tbody id="calBody"></tbody>
    </table>
  </div>
</div>

<div class="modal-overlay" id="bookModal">
  <div class="modal">
    <h3 id="bookTitle"></h3>
    <div class="modal-sub" id="bookSub"></div>
    <input type="text" id="bookName" placeholder="名前または用途を入力" />
    <div class="quick-names" id="quickNames"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeBook()">キャンセル</button>
      <button class="btn-delete" id="delBtn" onclick="doDelete()" style="display:none">削除</button>
      <button class="btn-save" onclick="doSave()">保存</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="devModal">
  <div class="modal">
    <h3 id="devModalTitle"></h3>
    <div class="field">
      <label>シリアル番号</label>
      <input type="text" id="devSerial" placeholder="シリアル番号" />
    </div>
    <div class="field">
      <label>Excel</label>
      <select id="devExcel">
        <option value="">未設定</option>
        <option value="あり">あり</option>
        <option value="なし">なし</option>
      </select>
    </div>
    <div class="field">
      <label>備考</label>
      <textarea id="devNote" placeholder="備考を入力"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeDev()">閉じる</button>
      <button class="btn-save" onclick="saveDev()">保存</button>
    </div>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyB1RkuJyX7A2WTepnUT1yTCkrfXaNFvGI8",
    authDomain: "fir-calendar-e69e3.firebaseapp.com",
    projectId: "fir-calendar-e69e3",
    storageBucket: "fir-calendar-e69e3.firebasestorage.app",
    messagingSenderId: "906734506706",
    appId: "1:906734506706:web:d2673c9ef02970e943d30b"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  const DEVICES = [
    "証憑セット①","証憑セット②","IR70","IR60","ハンディ",
    "G-stepNX9","WORK14","NX9仮想1","NX9仮想2","NX9仮想3","NX9仮想4","NX9仮想5",
    "G-stepNX7","NX7仮想1","NX7仮想2",
    "G-stepNX5","G-stepNX3","G-stepNX1","STG-stepNX",
    "WORK14(2)","LibertyNX300","LibertyNX200","LibertyNX100",
    "LibertyAISTATION","AI WORK②(1)","AI WORK②(2)","マルチモニター"
  ];
  const QUICK_OPTS = ["講習","展示会","外部貸出","メンテナンス"];
  const DAY_JP = ["日","月","火","水","木","金","土"];

  let currentUser = null, currentUserName = "", weekOffset = 0;
  let bookings = {}, deviceInfos = {}, currentSlot = null, currentDev = null;

  function getMonday(offset) {
    const now = new Date();
    const d = now.getDay();
    const diff = d === 0 ? -6 : 1 - d;
    const mon = new Date(now);
    mon.setDate(now.getDate() + diff + offset * 7);
    mon.setHours(0,0,0,0);
    return mon;
  }
  function getWeekDays(offset) {
    const mon = getMonday(offset);
    return Array.from({length:5}, (_,i) => { const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
  }
  function fmt(d) {
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  function isToday(d) { return d.toDateString() === new Date().toDateString(); }
  function slotId(device, date, ampm) {
    return device.replace(/[^\w]/g,'_')+'__'+date+'__'+ampm;
  }

  async function loadBookings() {
    const days = getWeekDays(weekOffset);
    const start = fmt(days[0]), end = fmt(days[4]);
    bookings = {};
    const snap = await db.collection("bookings").get();
    snap.forEach(doc => { const d=doc.data(); if(d.date>=start&&d.date<=end) bookings[doc.id]=d; });
  }

  async function loadDeviceInfos() {
    deviceInfos = {};
    const snap = await db.collection("devices").get();
    snap.forEach(doc => { deviceInfos[doc.id]=doc.data(); });
  }

  function renderCalendar() {
    const days = getWeekDays(weekOffset);
    document.getElementById("weekLabel").textContent =
      (days[0].getMonth()+1)+"/"+days[0].getDate()+" 〜 "+(days[4].getMonth()+1)+"/"+days[4].getDate();

    const head = document.getElementById("calHead");
    head.innerHTML = "";
    const tr1 = document.createElement("tr");
    tr1.innerHTML = '<th class="device-col">デモ機</th>' +
      days.map(d => `<th class="${isToday(d)?'today-col':''}" colspan="2">${d.getMonth()+1}/${d.getDate()}(${DAY_JP[d.getDay()]})</th>`).join("");
    head.appendChild(tr1);

    const tr2 = document.createElement("tr");
    tr2.innerHTML = '<th class="device-col" style="font-size:9px;"></th>' +
      days.map(d => `<th class="${isToday(d)?'today-col':''}" style="font-size:9px;font-weight:500;">午前</th><th class="${isToday(d)?'today-col':''}" style="font-size:9px;font-weight:500;">午後</th>`).join("");
    head.appendChild(tr2);

    const body = document.getElementById("calBody");
    body.innerHTML = "";
    DEVICES.forEach(device => {
      const tr = document.createElement("tr");
      let row = `<td><div class="device-name">${device}<button class="info-btn" onclick="openDev('${device.replace(/'/g,"\\'")}')">ℹ️</button></div></td>`;
      days.forEach(d => {
        const dateStr = fmt(d);
        ["AM","PM"].forEach(ampm => {
          const key = slotId(device, dateStr, ampm);
          const b = bookings[key];
          const name = b ? b.name : "";
          row += `<td><div class="slot ${name?'booked':'empty'}" onclick="openBook('${device.replace(/'/g,"\\'")}','${dateStr}','${ampm}')">
            <span class="slot-label">${ampm==="AM"?"午前":"午後"}</span>
            <span class="slot-text">${name||"+"}</span>
          </div></td>`;
        });
      });
      tr.innerHTML = row;
      body.appendChild(tr);
    });

    document.getElementById("loadingMsg").style.display = "none";
    document.getElementById("calTable").style.display = "";
  }

  function openBook(device, date, ampm) {
    currentSlot = {device, date, ampm};
    const key = slotId(device, date, ampm);
    const b = bookings[key];
    const d = new Date(date+"T00:00:00");
    document.getElementById("bookTitle").textContent = device+" ― "+(ampm==="AM"?"午前":"午後");
    document.getElementById("bookSub").textContent = (d.getMonth()+1)+"/"+d.getDate()+"（"+DAY_JP[d.getDay()]+"）";
    document.getElementById("bookName").value = b ? b.name : currentUserName;
    document.getElementById("delBtn").style.display = b ? "" : "none";
    const qn = document.getElementById("quickNames");
    qn.innerHTML = "";
    [currentUserName,...QUICK_OPTS].filter((v,i,a)=>v&&a.indexOf(v)===i).forEach(opt => {
      const btn = document.createElement("button");
      btn.className = "quick-btn"; btn.textContent = opt;
      btn.onclick = () => { document.getElementById("bookName").value = opt; };
      qn.appendChild(btn);
    });
    document.getElementById("bookModal").classList.add("active");
    setTimeout(()=>document.getElementById("bookName").focus(),150);
  }

  function closeBook() { document.getElementById("bookModal").classList.remove("active"); currentSlot=null; }

  async function doSave() {
    const name = document.getElementById("bookName").value.trim();
    if (!name) { alert("名前または用途を入力してください"); return; }
    const {device,date,ampm} = currentSlot;
    await db.collection("bookings").doc(slotId(device,date,ampm)).set({device,date,ampm,name,uid:currentUser.uid});
    closeBook(); await loadBookings(); renderCalendar();
  }

  async function doDelete() {
    if (!confirm("予約を削除しますか？")) return;
    const {device,date,ampm} = currentSlot;
    await db.collection("bookings").doc(slotId(device,date,ampm)).delete();
    closeBook(); await loadBookings(); renderCalendar();
  }

  function openDev(device) {
    currentDev = device;
    document.getElementById("devModalTitle").textContent = "📦 "+device;
    const info = deviceInfos[device]||{};
    document.getElementById("devSerial").value = info.serial||"";
    document.getElementById("devExcel").value = info.excel||"";
    document.getElementById("devNote").value = info.note||"";
    document.getElementById("devModal").classList.add("active");
  }
  function closeDev() { document.getElementById("devModal").classList.remove("active"); currentDev=null; }
  async function saveDev() {
    const data = {serial:document.getElementById("devSerial").value, excel:document.getElementById("devExcel").value, note:document.getElementById("devNote").value};
    await db.collection("devices").doc(currentDev).set(data);
    deviceInfos[currentDev]=data; closeDev(); alert("保存しました");
  }

  async function changeWeek(dir) {
    weekOffset+=dir;
    document.getElementById("loadingMsg").style.display="";
    document.getElementById("calTable").style.display="none";
    await loadBookings(); renderCalendar();
  }
  async function goToday() {
    weekOffset=0;
    document.getElementById("loadingMsg").style.display="";
    document.getElementById("calTable").style.display="none";
    await loadBookings(); renderCalendar();
  }

  function doLogin() {
    const email=document.getElementById("loginEmail").value;
    const pass=document.getElementById("loginPassword").value;
    document.getElementById("loginErr").textContent="";
    auth.signInWithEmailAndPassword(email,pass)
      .catch(()=>{ document.getElementById("loginErr").textContent="メールアドレスまたはパスワードが違います"; });
  }
  function doRegister() {
    const name=document.getElementById("regName").value.trim();
    const email=document.getElementById("regEmail").value;
    const pass=document.getElementById("regPass").value;
    document.getElementById("regErr").textContent="";
    if(!name){document.getElementById("regErr").textContent="お名前を入力してください";return;}
    auth.createUserWithEmailAndPassword(email,pass)
      .then(cred=>cred.user.updateProfile({displayName:name}))
      .catch(e=>{document.getElementById("regErr").textContent="登録エラー: "+e.message;});
  }
  function doLogout(){auth.signOut();}
  function showReg(){document.getElementById("loginForm").style.display="none";document.getElementById("regForm").style.display="";}
  function showLogin(){document.getElementById("regForm").style.display="none";document.getElementById("loginForm").style.display="";}

  auth.onAuthStateChanged(async user => {
    if (user) {
      currentUser = user;
      currentUserName = user.displayName || user.email;
      document.getElementById("userName").textContent = currentUserName;
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("appScreen").style.display = "";
      document.getElementById("loadingMsg").textContent = "データ読み込み中...";
      try {
        await loadDeviceInfos();
        await loadBookings();
        renderCalendar();
      } catch(e) {
        document.getElementById("loadingMsg").innerHTML =
          '<div style="color:red;padding:20px;font-size:13px;"><b>エラー:</b> ' + e.message + '</div>';
      }
    } else {
      currentUser = null;
      document.getElementById("loginScreen").style.display = "flex";
      document.getElementById("appScreen").style.display = "none";
    }
  });

  document.getElementById("bookModal").addEventListener("click",e=>{if(e.target.id==="bookModal")closeBook();});
  document.getElementById("devModal").addEventListener("click",e=>{if(e.target.id==="devModal")closeDev();});
</script>
</body>
</html>
