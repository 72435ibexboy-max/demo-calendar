<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>デモ機管理カレンダー</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    body { font-family: sans-serif; margin: 0; background: #f0f4ff; }
    #status { background: yellow; padding: 10px; font-size: 14px; }
    #loginScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: white; padding: 32px; border-radius: 12px; width: 320px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    h2 { color: #1a56db; margin-bottom: 16px; }
    input { display: block; width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #1a56db; color: white; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; margin-bottom: 8px; }
    .err { color: red; font-size: 13px; margin-top: 8px; }
    .link { color: #1a56db; cursor: pointer; font-size: 13px; text-align: center; margin-top: 8px; }
    #appScreen { display: none; }
    header { background: #1a56db; color: white; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; }
    .logout { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
    .content { padding: 20px; }
  </style>
</head>
<body>

<div id="status">初期化中...</div>

<div id="loginScreen" style="display:none">
  <div class="card">
    <h2>📋 デモ機管理</h2>
    <div id="loginForm">
      <input type="email" id="loginEmail" placeholder="メールアドレス" />
      <input type="password" id="loginPassword" placeholder="パスワード" />
      <button onclick="doLogin()">ログイン</button>
      <div class="err" id="loginErr"></div>
      <div class="link" onclick="showReg()">新規登録はこちら</div>
    </div>
    <div id="regForm" style="display:none">
      <input type="text" id="regName" placeholder="お名前" />
      <input type="email" id="regEmail" placeholder="メールアドレス" />
      <input type="password" id="regPass" placeholder="パスワード（6文字以上）" />
      <button onclick="doRegister()">登録</button>
      <div class="err" id="regErr"></div>
      <div class="link" onclick="showLogin()">ログインに戻る</div>
    </div>
  </div>
</div>

<div id="appScreen">
  <header>
    <span>📋 デモ機管理カレンダー</span>
    <button class="logout" onclick="doLogout()">ログアウト</button>
  </header>
  <div class="content">
    <p id="welcomeMsg"></p>
    <p id="dbStatus">データベース接続中...</p>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyB1RkuJyX7A2WTepnUT1yTCkrfXaNFvGI8",
    authDomain: "fir-calendar-e69e3.firebaseapp.com",
    projectId: "fir-calendar-e69e3",
    storageBucket: "fir-calendar-e69e3.firebasestorage.app",
    messagingSenderId: "906734506706",
    appId: "1:906734506706:web:d2673c9ef02970e943d30b"
  };

  document.getElementById("status").textContent = "Firebase初期化中...";

  try {
    firebase.initializeApp(firebaseConfig);
    document.getElementById("status").textContent = "Firebase初期化OK。認証確認中...";
  } catch(e) {
    document.getElementById("status").textContent = "Firebase初期化エラー: " + e.message;
  }

  const auth = firebase.auth();
  const db = firebase.firestore();

  auth.onAuthStateChanged(async user => {
    if (user) {
      document.getElementById("status").textContent = "ログイン済み: " + (user.displayName || user.email);
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("appScreen").style.display = "";
      document.getElementById("welcomeMsg").textContent = "ようこそ、" + (user.displayName || user.email) + "さん！";
      try {
        await db.collection("bookings").get();
        document.getElementById("dbStatus").textContent = "✅ データベース接続成功！";
        document.getElementById("status").style.background = "lightgreen";
      } catch(e) {
        document.getElementById("dbStatus").textContent = "❌ DBエラー: " + e.message;
        document.getElementById("status").style.background = "salmon";
      }
    } else {
      document.getElementById("status").textContent = "未ログイン。ログイン画面を表示します。";
      document.getElementById("loginScreen").style.display = "flex";
      document.getElementById("appScreen").style.display = "none";
    }
  });

  function doLogin() {
    const email = document.getElementById("loginEmail").value;
    const pass = document.getElementById("loginPassword").value;
    document.getElementById("loginErr").textContent = "";
    auth.signInWithEmailAndPassword(email, pass)
      .catch(e => { document.getElementById("loginErr").textContent = "エラー: " + e.message; });
  }

  function doRegister() {
    const name = document.getElementById("regName").value.trim();
    const email = document.getElementById("regEmail").value;
    const pass = document.getElementById("regPass").value;
    if (!name) { document.getElementById("regErr").textContent = "名前を入力してください"; return; }
    auth.createUserWithEmailAndPassword(email, pass)
      .then(cred => cred.user.updateProfile({displayName: name}))
      .catch(e => { document.getElementById("regErr").textContent = "エラー: " + e.message; });
  }

  function doLogout() { auth.signOut(); }
  function showReg() { document.getElementById("loginForm").style.display="none"; document.getElementById("regForm").style.display=""; }
  function showLogin() { document.getElementById("regForm").style.display="none"; document.getElementById("loginForm").style.display=""; }
</script>
</body>
</html>
